# ============================================================
# application.properties
# Configuración BASE del microservicio.
# Los valores de ambiente específico van en application.dev.yml,
# application.qa.yml, application.prod.yml
# ============================================================

# Nombre de la aplicación (usado en logs y Actuator)
spring.application.name=microservicio-practica
spring.profiles.active=dev

# Ruta base de todos los endpoints de la API
server.servlet.context-path=/api

server.port=8082

# ── JWT ─────────────────────────────────────────────────────────────────────
# Must be set via environment variable — no fallback to prevent accidental exposure
app.jwt.secret=${APP_JWT_SECRET}

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}

# ── H2 Console ──────────────────────────────────────────────────────────────
spring.h2.console.enabled=false
