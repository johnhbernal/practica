# ============================================================
# application.dev.yml
# Configuración del ambiente de DESARROLLO LOCAL
#
# CONCEPTO: Los perfiles de Spring permiten tener configuraciones
# distintas para cada ambiente sin cambiar el código fuente.
# ============================================================

server:
  port: 8080

spring:
  # ── BASE DE DATOS ──────────────────────────────────────────
  # En DEV usamos H2 (en memoria) para no necesitar PostgreSQL instalado
  datasource:
    url: jdbc:h2:mem:practica_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  # ── JPA / HIBERNATE ───────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # create-drop: Crea las tablas al iniciar y las borra al cerrar
      # Útil para desarrollo. En producción usar: validate o none
      ddl-auto: create-drop
    show-sql: true           # Muestra las queries SQL en consola
    properties:
      hibernate:
        format_sql: true     # Formatea el SQL para mejor legibilidad

  # ── H2 CONSOLA WEB ────────────────────────────────────────
  # Accesible en: http://localhost:8080/api/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

# ── LOGGING ─────────────────────────────────────────────────
logging:
  level:
    co.com.practica: DEBUG    # Nivel detallado para nuestro código
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

# ── CONFIGURACIÓN PERSONALIZADA ─────────────────────────────
# Variables propias del microservicio (accedidas con @Value o @ConfigurationProperties)
app:
  jwt:
    secret: "clave-secreta-desarrollo-super-larga-minimo-256-bits-para-hs256"
    expiration-ms: 3600000  # 1 hora en milisegundos
  ambiente: DEV
